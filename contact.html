<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Abel Daneesh John</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Abel Daneesh John</div>
        <ul class="nav-links">
            <li><a href="index.html">Overview</a></li>
            <li><a href="about.html">Experience</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <main class="container">
        <section class="content-card">
            <h1 class="heading" style="font-size: 2.25rem; margin-bottom: 2.5rem;">Contact Information</h1>
            
            <div class="contact-grid">
                <div class="contact-info">
                    <div class="info-item">
                        <span class="info-label">Direct Line</span>
                        <a href="tel:6579687678" class="info-value">6579687678</a>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Email Address</span>
                        <a href="mailto:abel@gmail.com" class="info-value">abel@gmail.com</a>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Location</span>
                        <span class="info-value">Saintgits College of Engineering</span>
                    </div>
                </div>

                <form class="contact-form">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="Enter your name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Business Email</label>
                        <input type="email" id="email" placeholder="Enter your email address" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" rows="4" placeholder="How can I help you?" required></textarea>
                    </div>
                    <button type="button" class="btn primary-btn submit-btn" onclick="alert('Message sent successfully.')">Submit Inquiry</button>
                </form>
            </div>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
